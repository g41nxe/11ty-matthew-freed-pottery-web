backend:
  name: github
  repo: g41nxe/11ty-matthew-freed-pottery-web
  branch: feat/sveltia-cms-migration

omit_empty_optional_fields: true

site_url: "https://matthewfreed.ca"
locale: "en"

media_folder: "src/images"
public_folder: "/images"

media_libraries:
  default:
    config:
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2048

editor:
  preview: false

collections:

  - label: "Pages"
    name: "pages"
    icon: article
    description: "Content for the main site pages."
    delete: false
    files:
      - label: "Home"
        name: "home"
        file: "src/views/home.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}

          - &pageNav
            label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - &notification
            label: "notification"
            name: "notification"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}

          - label: "event"
            name: "event"
            widget: "object"
            collapsed: true
            fields:
              - label: "What to show when there is no upcoming Event"
                name: "no_events"
                widget: "object"
                fields:
                  - {label: "title", name: "title", widget: "string"}
                  - {label: "text", name: "text", widget: "text"}
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}
              - {label: "title", name: "title", widget: "string"}
              - {label: "label", name: "label", widget: "string"}

          - label: "gallery"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Texts"
                name: "texts"
                widget: "list"
                summary: '{{fields.text}}'
                field: {label: "text", name: "text", widget: "text"}

          - label: "features"
            name: "features"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - label: "Texts"
                name: "texts"
                widget: "list"
                summary: '{{fields.text}}'
                field: {label: "text", name: "text", widget: "text"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Home - Gallery"
        name: "showcase"
        file: "src/views/_data/showcase.json"        
        fields:
          - label: "Gallery Items"
            name: "gallery"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: "{{fields.title}}"
            thumbnail: "image.url"
            fields:
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false}
                  - {label: "Alt Text", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - {label: "Style", name: "style", widget: "string"}

      - label: "Contact"
        name: "contact"
        file: "src/views/contact.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "string"}

          - *notification

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "subheadline", name: "subheadline", widget: "string"}

          - label: "Intro"
            name: "intro"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: '{{fields.text}}'
            field: {label: "text", name: "text", widget: "string"}

          - {label: "message", name: "message", widget: "string"}
          - {label: "phone", name: "phone", widget: "string"}
          - {label: "address", name: "address", widget: "string"}
          - {label: "gmaps", name: "gmaps", widget: "string"}

          - label: "contactform"
            name: "contactform"
            widget: "object"
            collapsed: true
            fields:
            - {label: "title", name: "title", widget: "string"}
            - {label: "submit", name: "submit", widget: "string"}
            - {label: "info", name: "info", widget: "string"}

          - *pageNav

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "About - About"
        name: "about"
        file: "src/views/about.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - *pageNav

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: '{{fields.label}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}
              - label: "paragraphs"
                name: "paragraphs"
                widget: "list"
                fields: 
                  - {label: "text", name: "text", widget: "text"}
              - {label: "label", name: "label", widget: "string"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}


      - label: "About - Pottery"
        name: "pottery"
        file: "src/views/pottery.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: '{{fields.label}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}
              - label: "paragraphs"
                name: "paragraphs"
                widget: "list"
                fields: 
                  - {label: "text", name: "text", widget: "text"}
              - {label: "label", name: "label", widget: "string"}

      - label: "About - Process"
        name: "process"
        file: "src/views/process.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: '{{fields.label}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}
              - label: "paragraphs"
                name: "paragraphs"
                widget: "list"
                fields: 
                  - {label: "text", name: "text", widget: "text"}
              - {label: "label", name: "label", widget: "string"}

          - *pageNav

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Collections"
        name: "collections"
        file: "src/views/collections.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - *pageNav

          - *notification

          - label: "headline"
            name: "headline"
            widget: "string"

          - label: "subheadline"
            name: "subheadline"
            widget: "string"

          - label: "intro"
            name: "intro"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - label: "texts"
                name: "texts"
                widget: "list"
                summary: '{{fields.text}}'
                field: {label: "text", name: "text", widget: "string"}

          - label: "features"
            name: "features"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - label: "texts"
                name: "texts"
                widget: "list"
                summary: '{{fields.text}}'
                field: {label: "text", name: "text", widget: "string"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Retail Stores"
        name: "retail-stores"
        file: "src/views/retail-stores.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}
              - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 7:5. Auto chooses the focus; pick a side to override."}

          - *notification
          - label: "body"
            name: "body"
            widget: "markdown"       

      - label: "Privacy Statement"
        name: "privacy-statement"
        file: "src/views/privacy-statement.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}

          - *notification
          - label: "body"
            name: "body"
            widget: "markdown"

  - label: "News & Events"
    name: "news-and-events"
    icon: event
    description: "News updates and event listings."
    delete: false
    files:
      - label: "News"
        name: "news"
        file: "src/views/_data/news.json"
        fields:
          - label: News List
            name: news
            widget: list
            collapsed: true
            add_to_top: true
            summary: "{{date}} - {{name}}"
            thumbnail: "image.url"
            fields:
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              time_format: false
              input_timezone: utc
            - name: name
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: text}
            - name: image
              widget: object
              collapsed: true
              fields:
                - {name: url, widget: image, media_folder: "/src/images/updates/", public_folder: "/images/updates", choose_url: false}
                - {name: alt, widget: string}
                - {name: focal, label: "Crop Focus", widget: select, options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 3:2. Auto chooses the focus; pick a side to override."}

      - label: "Events"
        name: "events"
        file: "src/views/_data/events.json"
        fields:
          - label: Event List
            name: events
            widget: list
            collapsed: true
            add_to_top: true
            summary: "{{date}} - {{name}}"
            fields: 
            - label: "Is it a multi day event?"
              name: multi_day_event
              widget: boolean
              default: false
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              time_format: false
              input_timezone: utc
            - name: end_date
              widget: datetime
              date_format: "MM-DD-YYYY"
              time_format: false
              input_timezone: utc
              required: false
            - name: time
              widget: string
            - name: name
              widget: string
            - name: location
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: text}
            - name: gmaps
              label: "Location on Google Maps"
              widget: string
            - name: featured
              widget: boolean
              default: true

  - name: "global"
    label: "Global Settings"
    icon: settings
    description: "Site-wide data: hero, contact, social links, SEO, featured items."
    delete: false
    files:
      - label: "General Data"
        name: "global"
        file: "src/views/_data/global.json"
        fields:
          - label: "Google Maps"
            name: "gmaps"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "API Key", name: "key", widget: "string"}

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false}
                  - {label: "Alt Text", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 5:3. Auto chooses the focus; pick a side to override."}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}

          - label: "Newsletter"
            name: "newsletter"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}

          - label: "Contact Information"
            name: "contact"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Address", name: "address", widget: "text"}
              - {label: "Phone", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

          - label: "Shop"
            name: "shop"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "URL", name: "url", widget: "string"}

          - label: "Social Media"
            name: "socialmedia"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Services"
                name: "services"
                widget: "object"
                fields:
                  - label: "Instagram"
                    name: "instagram"
                    widget: "object"
                    fields:
                      - {label: "Name", name: "name", widget: "string"}
                      - {label: "Icon", name: "icon", widget: "string"}
                      - {label: "URL", name: "url", widget: "string"}
                  - label: "Facebook"
                    name: "facebook"
                    widget: "object"
                    fields:
                      - {label: "Name", name: "name", widget: "string"}
                      - {label: "Icon", name: "icon", widget: "string"}
                      - {label: "URL", name: "url", widget: "string"}

      - label: "SEO Settings"
        name: "seo"
        file: "src/views/_data/seo.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "URL", name: "url", widget: "string"}
          - {label: "Author", name: "author", widget: "string"}
          - label: "Image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "URL", name: "url", widget: "image", choose_url: false}
              - {label: "Alt Text", name: "alt", widget: "string"}
          - label: "Options"
            name: "options"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title Divider", name: "titleDivider", widget: "string"}

      - label: "Featured Shop Items"
        name: "features"
        file: "src/views/_data/features.json"
        fields:
          - name: "features"
            label: "Featured Shop Items"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: "{{fields.title}}"
            thumbnail: "image.url"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Overlay"
                name: "overlay"
                widget: "object"
                fields:
                  - {label: "Text", name: "text", widget: "text"}
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false, media_folder: "/src/images/features", public_folder: "/images/features"}
                  - {label: "Alt Text", name: "alt", widget: "string"}
                  - {label: "Crop Focus", name: "focal", widget: "select", options: ["auto", "center", "top", "bottom", "left", "right"], default: "auto", hint: "Cropped to 4:3. Auto chooses the focus; pick a side to override."}
              - {label: "Hide", name: "hide", widget: "boolean", default: false}

  - name: "faq"
    label: "FAQ"
    icon: help
    description: "FAQ page intro and Q&A sections."
    delete: false
    files:
      - label: "FAQ Page"
        name: "faq-page"
        file: "src/views/faq.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}
          - {label: "load_more", name: "load_more", widget: "string"}

          - *notification

          - label: "image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}

      - label: "FAQ Sections"
        name: "faq"
        file: "src/views/_data/faq.json"
        fields:
          - label: "FAQ Sections"
            name: "sections"
            widget: "list"
            collapsed: true
            add_to_top: true
            summary: "{{fields.title}}"
            fields:
              - {label: "Section Title", name: "title", widget: "string"}
              - label: "Questions"
                name: "questions"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - {label: "Question", name: "title", widget: "string"}
                  - {label: "Answer", name: "body", widget: "text"}
