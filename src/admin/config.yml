backend:
  name: git-gateway
  branch: decap

local_backend: true

media_folder: "src/images"
public_folder: "images"

editor:
     preview: false

collections:
  - name: news
    label: News
    files:
      - label: News
        name: News
        file: "src/views/_data/events.json"
        fields:
          - label: News List
            name: news
            widget: list
            summary: "{{date}} - {{name}}"
            fields: 
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
            - name: name
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: text}
            - name: image
              widget: object
              collapsed: true
              fields:
                - {name: url, widget: image, media_folder: "/src/images/updates/", choose_url: false}
                - {name: alt, widget: string}

  - name: events 
    label: Events
    files:
      - label: Events
        name: events
        file: "src/views/_data/events.json"
        fields:
          - label: Event List
            name: events
            widget: list
            summary: "{{date}} - {{name}}"
            fields: 
            - label: "Is it a multi day event?"
              name: multi_day_event
              widget: boolean
              default: false
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
            - name: end_date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
            - name: time
              widget: string
            - name: name
              widget: string
            - name: location
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: string}
            - name: gmaps
              label: "Location on Google Maps"
              widget: strng
            - name: featured
              widget: boolean
              default: true

  - label: "Pages"
    name: "pages"
    files:
      - label: "Contact"
        name: "contact"
        file: "src/views/contact.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "string"}

          - label: "notification"
            name: "notification"
            widget: "object"
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "subheadline", name: "subheadline", widget: "string"}

          - label: "Intro"
            name: "intro"
            widget: "list"
            summary: '{{fields.text}}'
            field: {label: "text", name: "text", widget: "string"}

          - {label: "message", name: "message", widget: "string"}
          - {label: "phone", name: "phone", widget: "string"}
          - {label: "address", name: "address", widget: "string"}
          - {label: "gmaps", name: "gmaps", widget: "string"}

          - label: "contactform"
            name: "contactform"
            widget: "object"
            fields:
            - {label: "title", name: "title", widget: "string"}
            - {label: "submit", name: "submit", widget: "string"}
            - {label: "info", name: "info", widget: "string"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}


      - label: "About"
        name: "about"
        file: "src/views/about.md"
        fields:

          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "string"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            summary: '{{fields.label}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - label: "paragraphs"
                name: "paragraphs"
                widget: "list"
                fields: 
                  - {label: "text", name: "text", widget: "text"}
              - {label: "label", name: "label", widget: "string"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}


      - label: "Home"
        name: "home"
        file: "src/views/home.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "string"}

          - label: "notification"
            name: "notification"
            widget: "object"
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}
          
          - label: "event"
            name: "event"
            widget: "object"
            fields:
              - label: "What to show when there is no upcoming Event"
                name: "no_events"
                widget: "object"
                fields:
                  - {label: "title", name: "title", widget: "string"}
                  - {label: "text", name: "text", widget: "string"}
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - {label: "title", name: "title", widget: "string"}
              - {label: "label", name: "label", widget: "string"}
          
          - label: "gallery"
            name: "gallery"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Texts"
                label_singular: " "
                name: "texts"
                widget: "list"
                collapsed: false
                summary: '{{fields.text}}'
                field: {label: "text", name: "text", widget: "string"}

          - label: "features"
            name: "features"
            widget: "object"
            fields:
              - {label: "title", name: "title", widget: "string"}
              - label: "Texts"
                label_singular: " "
                name: "texts"
                collapsed: false
                summary: '{{fields.text}}'
                widget: "list"
                field: {label: "text", name: "text", widget: "string"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}
