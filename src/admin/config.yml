backend:
  name: git-gateway
  branch: main

local_backend: true

site_url: "https://matthewfreed.ca"
locale: "en"

media_folder: "src/images"
public_folder: "images"

editor:
  preview: false

collections:

  - label: "Pages"
    name: "pages"
    delete: false
    files:
      - label: "Home"
        name: "home"
        file: "src/views/home.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Highlight word (shown in sand)", name: "highlight", widget: "string", required: false}
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Primary button", name: "cta_primary", widget: "string"}
              - label: "Secondary link"
                name: "cta_secondary"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}

          - label: "Trust ribbon (below the hero)"
            name: "trust"
            widget: "list"
            collapsed: true
            hint: "Short claims in the ribbon under the hero. The same list drives both views — it scrolls on mobile and spreads across on desktop — and shows in uppercase."
            field: {label: "Claim", name: "item", widget: "string"}

          - label: "Featured piece"
            name: "featured_piece"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Glaze caption", name: "caption", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Price", name: "price", widget: "string", required: false}
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - label: "Shop link"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}

          - label: "Collections teaser"
            name: "collections_teaser"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

          - label: "Products section"
            name: "products"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Note under the grid", name: "note", widget: "string"}

          - label: "Events band"
            name: "events_band"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text when no events", name: "no_events", widget: "text"}

          - label: "Story teaser"
            name: "story_teaser"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string", required: false}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Quote", name: "quote", widget: "string", required: false}
              - {label: "Link label", name: "label", widget: "string"}
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Home - Gallery"
        name: "showcase"
        file: "src/views/_data/showcase.json"        
        fields:
          - label: "Gallery Items"
            name: "gallery"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false}
                  - {label: "Alt Text", name: "alt", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Shop collection slug (tail of the shop URL)", name: "slug", widget: "string"}
              - {label: "Swatch colour (hex)", name: "swatch", widget: "string", pattern: ["^#[0-9A-Fa-f]{6}$", "Must be a hex colour like #1F3A52"]}
              - label: "Filter groups"
                name: "filterGroups"
                widget: "select"
                multiple: true
                options: ["Blues", "Charcoals", "Patterned"]
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - {label: "Style", name: "style", widget: "string"}

      - label: "Contact"
        name: "contact"
        file: "src/views/contact.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "string"}

          - label: "notification"
            name: "notification"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "subheadline", name: "subheadline", widget: "string"}

          - label: "Intro"
            name: "intro"
            widget: "list"
            summary: '{{fields.text}}'
            field: {label: "text", name: "text", widget: "string"}

          - {label: "message", name: "message", widget: "string"}
          - {label: "phone", name: "phone", widget: "string"}
          - {label: "address", name: "address", widget: "string"}
          - {label: "gmaps", name: "gmaps", widget: "string"}

          - label: "contactform"
            name: "contactform"
            widget: "object"
            fields:
            - {label: "title", name: "title", widget: "string"}
            - {label: "submit", name: "submit", widget: "string"}
            - {label: "info", name: "info", widget: "string"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "About - About"
        name: "about"
        file: "src/views/about.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "eyebrow", name: "eyebrow", widget: "string"}
          - {label: "show_medal", name: "show_medal", widget: "hidden"}
          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}
          - {label: "Pull quote", name: "quote", widget: "text", required: false}

          - label: "sections"
            name: "sections"
            widget: "list"
            summary: '{{fields.image.alt}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - {label: "body", name: "body", widget: "markdown"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}


      - label: "About - Pottery"
        name: "pottery"
        file: "src/views/pottery.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            summary: '{{fields.image.alt}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - {label: "body", name: "body", widget: "markdown"}

      - label: "About - Process"
        name: "process"
        file: "src/views/process.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "sections"
            name: "sections"
            widget: "list"
            summary: '{{fields.image.alt}}'
            fields:
              - label: "image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "url", name: "url", widget: "image", choose_url: false}
                  - {label: "alt", name: "alt", widget: "string"}
              - {label: "body", name: "body", widget: "markdown"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Collections"
        name: "collections"
        file: "src/views/collections.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

          - label: "Filter chips"
            name: "filters"
            widget: "list"
            field: {label: "Filter", name: "filter", widget: "string"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

      - label: "Retail Stores"
        name: "retail-stores"
        file: "src/views/retail-stores.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "eyebrow", name: "eyebrow", widget: "string", required: false}
          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "image"
            name: "image"
            widget: "object"
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}

          - label: "Stores"
            name: "stores"
            widget: "list"
            summary: "{{fields.name}} — {{fields.city}}"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Website URL", name: "url", widget: "string"}
              - {label: "Street address", name: "address", widget: "string"}
              - {label: "City", name: "city", widget: "string"}

          - {label: "body", name: "body", widget: "markdown", required: false}

      - label: "Privacy Statement"
        name: "privacy-statement"
        file: "src/views/privacy-statement.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}

          - label: "image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}

          - label: "notification"
            name: "notification"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}
          - label: "body"
            name: "body"
            widget: "markdown"

      - label: "Events Page"
        name: "events-page"
        file: "src/views/events.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}

          - label: "eleventyNavigation"
            name: "eleventyNavigation"
            widget: "hidden"
            fields:
              - {label: "key", name: "key", widget: "hidden"}
              - {label: "order", name: "order", widget: "hidden"}

          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}

          - {label: "Annual rhythm note", name: "rhythm", widget: "text"}

          - label: "Visit the studio card"
            name: "studio"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
              - label: "Button"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - {label: "Footnote", name: "footnote", widget: "text"}

          - {label: "Text when no events", name: "no_events", widget: "text"}

          - {label: "custom_seo_settings", name: "custom_seo_settings", widget: "hidden"}
          - {label: "author", name: "author", widget: "hidden"}
          - {label: "excerpt", name: "excerpt", widget: "hidden"}
          - {label: "image", name: "image", widget: "hidden"}
          - {label: "ogtype", name: "ogtype", widget: "hidden"}

  - label: "News & Events"
    name: "news-and-events"
    delete: false
    files:
      - label: "News"
        name: "news"
        file: "src/views/_data/news.json"
        fields:
          - label: News List
            name: news
            widget: list
            summary: "{{date}} - {{name}}"
            fields: 
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
            - name: name
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: text}
            - name: image
              widget: object
              collapsed: true
              fields:
                - {name: url, widget: image, media_folder: "/src/images/updates/", public_folder: "/images/updates", choose_url: false}
                - {name: alt, widget: string}

      - label: "Events"
        name: "events"
        file: "src/views/_data/events.json"
        fields:
          - label: Event List
            name: events
            widget: list
            summary: "{{date}} - {{name}}"
            fields: 
            - label: "Is it a multi day event?"
              name: multi_day_event
              widget: boolean
              default: false
            - label: Date
              name: date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
            - name: end_date
              widget: datetime
              date_format: "MM-DD-YYYY"
              picker_utc: true
              required: false
            - name: time
              widget: string
            - name: name
              widget: string
            - name: location
              widget: string
            - name: content
              widget: object
              collapsed: true
              fields:
                - {name: title, widget: string}
                - {name: body, widget: text}
            - name: gmaps
              label: "Location on Google Maps"
              widget: string
            - name: featured
              widget: boolean
              default: true
            - label: "Takes place at my studio"
              name: atStudio
              widget: boolean
              default: false

  - name: "global"
    label: "Global Settings"
    delete: false
    files:
      - label: "General Data"
        name: "global"
        file: "src/views/_data/global.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false}
                  - {label: "Alt Text", name: "alt", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}

          - label: "Contact Information"
            name: "contact"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Address", name: "address", widget: "text"}
              - {label: "Phone", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

          - label: "Shop"
            name: "shop"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Base URL (no trailing slash)", name: "base", widget: "string"}
              - {label: "Collections path", name: "collectionsPath", widget: "string"}

          - label: "Social Media"
            name: "socialmedia"
            widget: "object"
            minimize_collapsed: true
            collapsed: true
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - label: "Services"
                name: "services"
                widget: "object"
                fields:
                  - label: "Instagram"
                    name: "instagram"
                    widget: "object"
                    fields:
                      - {label: "Name", name: "name", widget: "string"}
                      - {label: "Icon", name: "icon", widget: "string"}
                      - {label: "URL", name: "url", widget: "string"}
                  - label: "Facebook"
                    name: "facebook"
                    widget: "object"
                    fields:
                      - {label: "Name", name: "name", widget: "string"}
                      - {label: "Icon", name: "icon", widget: "string"}
                      - {label: "URL", name: "url", widget: "string"}

      - label: "SEO Settings"
        name: "seo"
        file: "src/views/_data/seo.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "URL", name: "url", widget: "string"}
          - {label: "Author", name: "author", widget: "string"}
          - label: "Image"
            name: "image"
            widget: "object"
            fields:
              - {label: "URL", name: "url", widget: "image", choose_url: false}
              - {label: "Alt Text", name: "alt", widget: "string"}
          - label: "Options"
            name: "options"
            widget: "object"
            fields:
              - {label: "Title Divider", name: "titleDivider", widget: "string"}

      - label: "Featured Shop Items"
        name: "features"
        file: "src/views/_data/showcase.json"
        fields:
          - name: "features"
            label: "Featured Shop Items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Price", name: "price", widget: "string", required: false}
              - label: "Overlay"
                name: "overlay"
                widget: "object"
                fields:
                  - {label: "Text", name: "text", widget: "text"}
              - label: "CTA"
                name: "cta"
                widget: "object"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - {label: "URL", name: "url", widget: "image", choose_url: false, media_folder: "/src/images/features", public_folder: "/images/features"}
                  - {label: "Alt Text", name: "alt", widget: "string"}
              - {label: "Hide", name: "hide", widget: "boolean", default: false}

  - name: "faq"
    label: "FAQ"
    delete: false
    files:
      - label: "FAQ Page"
        name: "faq-page"
        file: "src/views/faq.md"
        fields:
          - {label: "layout", name: "layout", widget: "hidden"}
          - {label: "title", name: "title", widget: "string"}
          - {label: "permalink", name: "permalink", widget: "hidden"}
          - {label: "tags", name: "tags", widget: "hidden"}

          - {label: "headline", name: "headline", widget: "string"}
          - {label: "intro", name: "intro", widget: "text"}
          - {label: "load_more", name: "load_more", widget: "string"}

          - label: "notification"
            name: "notification"
            widget: "object"
            collapsed: true
            fields:
              - {label: "title", name: "title", widget: "string"}
              - {label: "subtitle", name: "subtitle", widget: "string"}
              - label: "cta"
                name: "cta"
                widget: "object"
                fields: 
                  - {label: "label", name: "label", widget: "string"}
                  - {label: "url", name: "url", widget: "string"}

          - label: "image"
            name: "image"
            widget: "object"
            collapsed: true
            fields:
              - {label: "url", name: "url", widget: "image", choose_url: false}
              - {label: "alt", name: "alt", widget: "string"}

      - label: "FAQ Sections"
        name: "faq"
        file: "src/views/_data/faq.json"
        fields:
          - label: "FAQ Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Section Title", name: "title", widget: "string"}
              - label: "Questions"
                name: "questions"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - {label: "Question", name: "title", widget: "string"}
                  - {label: "Answer", name: "body", widget: "text"}
